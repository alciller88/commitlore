name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run $(go list ./... | grep -v /app)

      - name: Run tests
        run: go test $(go list ./... | grep -v /app) -race -coverprofile=coverage.out

      - name: Build
        run: go build $(go list ./... | grep -v /app)
